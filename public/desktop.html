<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Redirect</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var base = path.replace(/desktop\.html$/i, "");
        window.location.replace(base + "?ui=desktop");
      })();
    </script>
  </head>
  <body></body>
</html>
